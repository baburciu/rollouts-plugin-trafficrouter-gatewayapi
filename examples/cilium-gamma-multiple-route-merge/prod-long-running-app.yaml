---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollouts-demo
  namespace: default
spec:
  replicas: 10
  strategy:
    canary:
      canaryService: rollouts-demo-canary-service
      stableService: rollouts-demo-stable-service
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoutes:
              - name: rollouts-demo-http-route
                # useHeaderRoutes: true
            namespace: default
        # managedRoutes:
        #   - name: argo-rollouts
      steps:
        - pause: {}
        # - setCanaryScale:
        #     replicas: 1
        # - setHeaderRoute:
        #     name: argo-rollouts
        #     match:
        #       - headerName: X-Test
        #         headerValue:
        #           exact: test
        # - pause: {}
        # - setHeaderRoute: # remove header route
        #     name: argo-rollouts
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: rollouts-demo
  template:
    metadata:
      labels:
        app: rollouts-demo
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0
          args:
          - "-text=Hello from $(POD_NAME)"
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
          - name: APP_VERSION
            value: "1.0.0"
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          resources:
            requests:
              memory: 32Mi
              cpu: 5m
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo-service
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: http
  selector:
    app: dummy # dummy selector needed for Cilium, see https://github.com/cilium/cilium/issues/38415
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo-canary-service
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: http
  selector:
    app: rollouts-demo
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo-stable-service
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: http
  selector:
    app: rollouts-demo
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: rollouts-demo-http-route
  namespace: default
spec:
  parentRefs:
    - group: ""
      name: rollouts-demo-service
      kind: Service
      port: 80
  rules:
    - backendRefs:
        - name: rollouts-demo-stable-service
          group: ""
          port: 80
          kind: Service
          weight: 80
        - name: rollouts-demo-canary-service
          group: ""
          port: 80
          kind: Service
          weight: 20
