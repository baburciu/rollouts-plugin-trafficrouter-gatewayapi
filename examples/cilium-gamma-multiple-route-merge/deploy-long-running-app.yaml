---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollouts-demo
  namespace: default
spec:
  replicas: 10
  selector:
    matchLabels:
      app: rollouts-demo
  template:
    metadata:
      labels:
        app: rollouts-demo
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0
          args:
          - "-text=Hello from $(POD_NAME)"
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
          - name: APP_VERSION
            value: "1.0.0"
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          resources:
            requests:
              memory: 32Mi
              cpu: 5m
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo-service
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: http
  selector:
    app: dummy # dummy selector needed for Cilium, see https://github.com/cilium/cilium/issues/38415
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo-stable-service
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: http
  selector:
    app: rollouts-demo
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: rollouts-demo-http-route
  namespace: default
spec:
  parentRefs:
    - group: ""
      name: rollouts-demo-service
      kind: Service
      port: 80
  rules:
    - backendRefs:
        - name: rollouts-demo-stable-service
          group: ""
          port: 80
          kind: Service
          weight: 80
