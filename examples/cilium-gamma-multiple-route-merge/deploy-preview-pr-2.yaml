---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-preview-rollouts-demo-pr-2
  namespace: default
spec:
  replicas: 5
  selector:
    matchLabels:
      app: prod-preview-rollouts-demo-pr-2
  template:
    metadata:
      labels:
        app: prod-preview-rollouts-demo-pr-2
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0
          args:
          - "-text=Hello from $(POD_NAME)"
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
          - name: APP_VERSION
            value: "1.0.0"
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          resources:
            requests:
              memory: 32Mi
              cpu: 5m
---
apiVersion: v1
kind: Service
metadata:
  name: prod-preview-rollouts-demo-pr-2-stable-service
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: http
  selector:
    app: prod-preview-rollouts-demo-pr-2
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: prod-preview-rollouts-demo-pr-2-http-route
  namespace: default
spec:
  parentRefs:
    - group: ""
      name: rollouts-demo-service  # use the same parent svc as the long-running App instance
      kind: Service
      port: 80
  rules:
    - backendRefs:
        - name: prod-preview-rollouts-demo-pr-2-stable-service
          group: ""
          port: 80
          kind: Service
          weight: 10
